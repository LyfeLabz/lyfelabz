<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LyfeLabz - Google Classroom callback</title>
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { display: flex; align-items: center; justify-content: center; text-align: center; padding: 1.5rem; color: #222; }
  main { max-width: 32rem; }
  h1 { font-size: 1.25rem; font-weight: 500; margin: 0 0 0.5rem 0; }
  p { margin: 0.25rem 0; color: #555; }
</style>
</head>
<body>
<main>
<h1>Finishing your connection...</h1>
<p>You can close this window if it does not close on its own.</p>
</main>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var code = params.get("code");
  var state = params.get("state");
  var error = params.get("error");
  var payload = { type: "lyfelabz-lms-oauth" };
  if (error) { payload.error = String(error); }
  else if (code && state) { payload.code = String(code); payload.state = String(state); }
  else { payload.error = "missing-code-or-state"; }
  try {
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage(payload, window.location.origin);
    }
  } catch (e) {
    // Cross-origin failure is unexpected; the parent will time out on cancel.
  }
  window.setTimeout(function () { try { window.close(); } catch (e) {} }, 250);
})();
</script>
</body>
</html>
