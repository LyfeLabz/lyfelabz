<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LyfeLabz Platform</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.5;
  }
  #app-root { text-align: center; padding: 1.5rem; max-width: 40rem; }
  h1 { font-size: 1.5rem; font-weight: 500; margin: 0 0 0.5rem 0; }
  p { margin: 0.25rem 0; }
  button { margin-top: 1rem; padding: 0.5rem 1rem; font: inherit; cursor: pointer; }
  [role="alert"] { color: #a00; }
</style>
<style id="shell-canonical">
  /* Teacher Platform Shell layout tokens. Reuses inherited typography;
     introduces no new design system. See SPRINT_3_STEP_5_SPECIFICATION.md. */
  #app-root:has(> .shell-header) {
    display: block;
    text-align: left;
    padding: 0;
    max-width: none;
    width: 100%;
    align-self: stretch;
  }
  body:has(#app-root > .shell-header) {
    display: block;
    align-items: initial;
    justify-content: initial;
  }
  .shell-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.5rem 1.25rem;
    height: 56px;
    border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    background: #fff;
    box-sizing: border-box;
  }
  .shell-brand {
    font-size: 1.05rem;
    font-weight: 600;
    margin: 0;
    flex: 0 0 auto;
  }
  .shell-header-identity {
    flex: 1 1 auto;
    text-align: right;
    font-size: 0.95rem;
    color: #444;
    min-width: 0;
  }
  .shell-header-name {
    display: inline-block;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    vertical-align: bottom;
  }
  .shell-notifications {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    color: #b8b8b8;
    font-size: 1.15rem;
    line-height: 1;
    flex: 0 0 auto;
    user-select: none;
  }
  .shell-signout {
    margin: 0;
    padding: 0.4rem 0.9rem;
    background: transparent;
    border: 1px solid #ccc;
    border-radius: 4px;
    cursor: pointer;
    font: inherit;
    flex: 0 0 auto;
    min-height: 36px;
  }
  .shell-signout:hover, .shell-signout:focus-visible {
    border-color: #666;
  }
  .shell-body {
    display: grid;
    grid-template-columns: 224px 1fr;
    max-width: 1760px;
    margin: 0 auto;
    padding: 1.25rem 1.5rem 1.25rem 1rem;
    gap: 2.75rem;
    box-sizing: border-box;
  }
  @media (min-width: 1280px) {
    .shell-body {
      padding-left: 1.25rem;
      padding-right: 2.25rem;
      gap: 3.25rem;
    }
  }
  @media (min-width: 1600px) {
    .shell-body {
      padding-left: 1.5rem;
      padding-right: 2.5rem;
      gap: 3.75rem;
    }
  }
  .shell-nav-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }
  .shell-nav-button {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    width: 100%;
    text-align: left;
    padding: 0.55rem 0.75rem;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 4px;
    font: inherit;
    margin: 0;
    min-height: 40px;
    box-sizing: border-box;
  }
  .shell-nav-brand {
    display: block;
  }
  .shell-nav-active {
    background: #f4f4f4;
    font-weight: 600;
    cursor: default;
  }
  .shell-nav-brand {
    font-weight: 700;
    letter-spacing: 0.06em;
    color: #222;
    padding-top: 1.1rem;
    padding-bottom: 1.1rem;
    margin-bottom: 0.75rem;
    border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    border-radius: 0;
    background: transparent;
  }
  .shell-nav-icon {
    flex: 0 0 auto;
    display: inline-block;
    vertical-align: middle;
    opacity: 0.85;
  }
  .shell-nav-label {
    display: inline-block;
    vertical-align: middle;
  }
  .shell-nav-brand.shell-nav-active {
    background: transparent;
  }
  .shell-nav-disabled {
    color: #8a8a8a;
    cursor: not-allowed;
  }
  .shell-nav-disabled:hover, .shell-nav-disabled:focus { color: #8a8a8a; }
  .shell-main {
    display: block;
    min-width: 0;
  }
  .shell-welcome {
    font-size: 1.5rem;
    font-weight: 500;
    margin: 0 0 0.5rem 0;
    outline: none;
  }
  .shell-welcome:focus-visible { outline: 2px solid #444; outline-offset: 2px; }
  .shell-status {
    color: #555;
    margin: 0 0 1.25rem 0;
  }
  .shell-card {
    background: #fff;
    border: 1px solid rgba(0, 0, 0, 0.09);
    border-radius: 6px;
    padding: 1rem 1.15rem;
    margin: 0 0 1rem 0;
  }
  .shell-identity-list {
    display: grid;
    grid-template-columns: minmax(120px, auto) 1fr;
    gap: 0.35rem 1rem;
    margin: 0;
  }
  .shell-identity-row {
    display: contents;
  }
  .shell-identity-row dt {
    font-weight: 600;
    color: #333;
    margin: 0;
  }
  .shell-identity-row dd {
    margin: 0;
    color: #222;
    word-break: break-word;
  }
  .shell-pill {
    display: inline-block;
    padding: 0.1rem 0.55rem;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 600;
    line-height: 1.3;
  }
  .shell-pill-verified {
    background: rgba(207, 168, 60, 0.18);
    color: #8a6d15;
    border: 1px solid rgba(138, 109, 21, 0.25);
  }
  .shell-placeholder-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin: 0.5rem 0 1.5rem 0;
  }
  .shell-placeholder-card {
    background: #fafafa;
    color: #666;
    cursor: not-allowed;
  }
  .shell-placeholder-card:hover, .shell-placeholder-card:focus { background: #fafafa; }
  .shell-placeholder-title {
    font-size: 1rem;
    margin: 0 0 0.35rem 0;
    color: #333;
  }
  .shell-placeholder-purpose { margin: 0 0 0.5rem 0; }
  .shell-placeholder-status { margin: 0; font-size: 0.9rem; }
  .shell-return-link {
    display: inline-block;
    margin-top: 0.75rem;
    font-size: 0.9rem;
    color: #555;
  }
  /* Curriculum landing (Sprint 6D). Reuses the shell card language and
     introduces teacher-only activation controls. Placeholder-only:
     activation state is client-local per mount. */
  .shell-curriculum-intro {
    max-width: 46rem;
  }
  .shell-curriculum-controls {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin: 0 0 1rem 0;
  }
  .shell-filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
  }
  .shell-filter-pill {
    padding: 0.35rem 0.75rem;
    background: #fff;
    border: 1px solid rgba(0, 0, 0, 0.15);
    border-radius: 999px;
    font: inherit;
    font-size: 0.9rem;
    color: #333;
    cursor: pointer;
    min-height: 32px;
  }
  .shell-filter-pill:hover, .shell-filter-pill:focus-visible {
    border-color: #666;
  }
  .shell-filter-pill-active {
    background: #eef1f5;
    border-color: #666;
    font-weight: 600;
  }
  .shell-curriculum-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    /* Sprint 20 polish: horizontal gap preserved; vertical gap tightened
       (~35%) so the grid reads as one continuous curriculum library. */
    column-gap: 0.85rem;
    row-gap: 0.55rem;
    margin: 0.75rem 0 1.25rem 0;
    min-width: 0;
  }
  .shell-lesson-card {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    padding: 0.55rem 0.85rem 0.55rem 0.85rem;
    /* Sprint 20 polish: override the inherited .shell-card
       margin-bottom that stacked with the grid row-gap and inflated
       row spacing. Card height is now driven only by content + the
       grid's own row track. */
    margin: 0;
    transition: opacity 0.15s ease-in-out;
    box-sizing: border-box;
    min-width: 0;
    overflow: hidden;
    /* Sprint 20 UI polish, Curriculum uniform-height fix.
       Enforce a single deliberate card height across the entire grid,
       not just within a row. CSS Grid alone equalizes track heights
       per row; this min-height carries the same height across every
       row so the Curriculum reads as one uniform library. The value
       is the smallest comfortable height that fits the canonical
       card contents: header pills row + reserved two-line title
       region + action row, plus current internal spacing. */
    min-height: 8.75rem;
  }
  .shell-lesson-card[hidden] { display: none; }
  .shell-lesson-card-inactive {
    background: #f6f6f6;
    opacity: 0.72;
  }
  .shell-lesson-header {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    align-items: center;
  }
  .shell-lesson-badge {
    display: inline-block;
    padding: 0.1rem 0.55rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
    line-height: 1.4;
    background: #eef1f5;
    color: #444;
    border: 1px solid rgba(0, 0, 0, 0.08);
  }
  .shell-lesson-topic-life-science       { background: rgba(61,220,132,0.14);  color: #1f6b3d; }
  .shell-lesson-topic-earth-space        { background: rgba(180,127,255,0.14); color: #5b3a99; }
  .shell-lesson-topic-physical-science   { background: rgba(255,112,67,0.14);  color: #a24218; }
  .shell-lesson-topic-tech-engineering   { background: rgba(245,200,66,0.18);  color: #7a5b0a; }
  .shell-lesson-title {
    font-size: 1.02rem;
    font-weight: 600;
    color: #222;
    margin: 0;
  }
  .shell-lesson-card-inactive .shell-lesson-title { color: #555; }
  .shell-lesson-title-row {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 0.35rem 0.6rem;
    min-width: 0;
    /* Sprint 20 final structural pass: widen the gap between the
       Grade / Topic metadata pills and the lesson title so the title
       reads as a distinct hierarchical level rather than an extension
       of the pill row. Delta from prior value is ~4px. */
    margin-top: 0.4rem;
  }
  .shell-lesson-title-row .shell-lesson-title {
    flex: 1 1 auto;
    min-width: 0;
    overflow-wrap: anywhere;
    /* Sprint 20 UI polish, Curriculum uniform-height fix.
       Reserve exactly two lines of title height on every card so a
       one-line title no longer collapses its grid row and a two-line
       title no longer stretches its neighbors. One-line titles remain
       top-aligned (no vertical centering) because the block simply
       fills its reserved space from the top. Titles that would exceed
       two lines are visually clamped; the full stored title stays in
       the DOM node and remains available to assistive tech via the
       element's own textContent / accessible name. Reserved height is
       expressed in em so it tracks the title's own line-height (1.3)
       regardless of the exact font-size chosen upstream. */
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;
    line-clamp: 2;
    overflow: hidden;
    min-height: 2.6em;
  }
  .shell-lesson-actions {
    display: flex;
    flex-wrap: nowrap;
    justify-content: flex-start;
    align-items: center;
    gap: 0.5rem;
    /* Sprint 20 final structural pass: shift the action row downward
       so it is visually separated from the title without being pinned
       to the bottom edge. The card layout remains Metadata -> Title ->
       Action with balanced whitespace around the action. Delta from
       prior value is ~8px. */
    margin-top: 0.55rem;
    min-width: 0;
  }
  .shell-lesson-actions > * {
    min-width: 0;
    max-width: 100%;
  }
  /* View summaries always sits on the right of the status bar so the
     Assign / Assigned control on the left has a stable location. */
  .shell-lesson-actions .shell-lesson-view-summary {
    margin-left: auto;
  }
  .shell-lesson-toggle {
    padding: 0.25rem 0.6rem;
    background: #fff;
    border: 1px solid rgba(0, 0, 0, 0.18);
    border-radius: 999px;
    font: inherit;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    cursor: pointer;
    min-height: 28px;
  }
  .shell-lesson-toggle[hidden] { display: none; }
  .shell-lesson-toggle-active {
    background: rgba(61, 140, 89, 0.12);
    border-color: rgba(61, 140, 89, 0.45);
    color: #1f6b3d;
  }
  .shell-lesson-toggle-inactive {
    background: rgba(162, 66, 24, 0.10);
    border-color: rgba(162, 66, 24, 0.35);
    color: #a24218;
  }
  .shell-lesson-toggle:hover, .shell-lesson-toggle:focus-visible {
    border-color: #333;
  }
  .shell-curriculum-empty {
    color: #666;
    margin: 0.25rem 0 1rem 0;
  }
  @media (pointer: coarse) {
    .shell-filter-pill { min-height: 44px; }
    .shell-lesson-toggle { min-height: 32px; }
  }
  @media (max-width: 480px) {
    .shell-lesson-actions {
      flex-wrap: wrap;
      justify-content: stretch;
    }
    .shell-lesson-assign,
    .shell-lesson-view-summary {
      flex: 1 1 auto;
      text-align: center;
    }
  }
  .shell-footer {
    text-align: center;
    padding: 1rem;
    color: #888;
    font-size: 0.85rem;
    border-top: 1px solid rgba(0, 0, 0, 0.06);
    margin-top: 1.5rem;
  }
  @media (max-width: 960px) {
    .shell-placeholder-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 720px) {
    .shell-body { grid-template-columns: 1fr; padding: 1rem; gap: 1rem; }
    .shell-nav-list { flex-direction: row; overflow-x: auto; }
    .shell-nav-button { min-width: 140px; }
    .shell-placeholder-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 480px) {
    .shell-header { height: 48px; padding: 0.35rem 0.75rem; gap: 0.5rem; }
    .shell-brand { font-size: 0.95rem; }
    .shell-header-identity { display: none; }
  }
  @media (pointer: coarse) {
    .shell-nav-button, .shell-signout { min-height: 44px; }
    .shell-notifications { width: 44px; height: 44px; }
  }
  @media (orientation: landscape) and (max-width: 950px) {
    .shell-body { padding-left: max(1rem, env(safe-area-inset-left)); padding-right: max(1rem, env(safe-area-inset-right)); }
  }
  @media (prefers-reduced-motion: reduce) {
    .shell-main, .shell-card { transition: none !important; animation: none !important; }
  }
  /* Sprint 8C: Settings > Integrations surface. Reuses the shell card
     language; introduces no new design system. */
  .shell-settings-category-button {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    padding: 0;
    font: inherit;
    color: inherit;
    cursor: pointer;
  }
  .shell-settings-category-button:hover .shell-settings-category-title,
  .shell-settings-category-button:focus-visible .shell-settings-category-title {
    text-decoration: underline;
  }
  .shell-settings-category-hint {
    margin: 0.35rem 0 0 0;
    font-size: 0.85rem;
    color: #555;
  }
  .shell-integrations {
    display: block;
  }
  .shell-integrations-back {
    background: transparent;
    border: none;
    color: #444;
    font: inherit;
    padding: 0.25rem 0;
    margin-bottom: 0.5rem;
    cursor: pointer;
  }
  .shell-integrations-back:hover,
  .shell-integrations-back:focus-visible { text-decoration: underline; }
  .shell-integrations-heading {
    font-size: 1.05rem;
    margin: 0;
    color: #222;
  }
  .shell-integrations-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .shell-integrations-row {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .shell-integrations-row-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    justify-content: space-between;
    flex-wrap: wrap;
  }
  .shell-integrations-pill-inactive {
    background: #eef1f5;
    color: #555;
    border: 1px solid rgba(0, 0, 0, 0.08);
  }
  .shell-integrations-actions {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .shell-integrations-error {
    color: #a24218;
    background: rgba(255, 112, 67, 0.08);
    border: 1px solid rgba(162, 66, 24, 0.25);
    border-radius: 4px;
    padding: 0.6rem 0.85rem;
    margin: 0 0 1rem 0;
  }
  .shell-integrations-info {
    color: #1f6b3d;
    background: rgba(61, 220, 132, 0.08);
    border: 1px solid rgba(61, 140, 89, 0.3);
    border-radius: 4px;
    padding: 0.6rem 0.85rem;
    margin: 0 0 1rem 0;
  }
  .shell-integrations-candidates {
    list-style: none;
    padding: 0;
    margin: 0.5rem 0 1rem 0;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }
  .shell-integrations-candidate {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 0.9rem;
    background: #fafafa;
    border: 1px solid rgba(0, 0, 0, 0.09);
    border-radius: 4px;
    flex-wrap: wrap;
  }
  .shell-integrations-candidate-name { margin: 0; font-weight: 600; color: #222; }
  .shell-integrations-candidate-section { margin: 0.15rem 0 0 0; font-size: 0.85rem; color: #555; }
  .shell-integrations-candidate-controls {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .shell-integrations-select-label {
    font-size: 0.85rem;
    color: #444;
  }
  .shell-integrations-select {
    font: inherit;
    padding: 0.3rem 0.4rem;
    min-height: 32px;
    border: 1px solid rgba(0, 0, 0, 0.18);
    border-radius: 4px;
    background: #fff;
  }
  .shell-integrations-empty {
    color: #555;
    margin: 0.5rem 0 1rem 0;
  }
  @media (pointer: coarse) {
    .shell-integrations-back, .shell-integrations-select { min-height: 44px; }
  }
  /* Assign Experience (Sprint 6E, remediated Sprint 20).
     The Curriculum surface builds a modal overlay for the Assign action
     entirely in JS with the classes below. Without these rules the
     overlay renders as an unpositioned block at the end of <body>, so
     clicking Assign appears to do nothing. Canonical LyfeLabz shell
     tokens; no new design system. */
  .shell-lesson-assign {
    padding: 0.35rem 0.75rem;
    font: inherit;
    background: #1f6b3d;
    color: #fff;
    border: 1px solid #1f6b3d;
    border-radius: 4px;
    cursor: pointer;
    min-height: 36px;
  }
  .shell-lesson-assign:hover, .shell-lesson-assign:focus-visible {
    background: #175a31;
    border-color: #175a31;
  }
  .shell-lesson-assign-assigned {
    background: #fff;
    color: #1f6b3d;
  }
  .shell-lesson-assign-assigned:hover,
  .shell-lesson-assign-assigned:focus-visible {
    background: rgba(31, 107, 61, 0.08);
    color: #175a31;
  }
  .shell-lesson-view-summary {
    padding: 0.35rem 0.75rem;
    font: inherit;
    background: #fff;
    color: #333;
    border: 1px solid rgba(0, 0, 0, 0.18);
    border-radius: 4px;
    cursor: pointer;
    min-height: 36px;
  }
  .shell-lesson-view-summary:hover,
  .shell-lesson-view-summary:focus-visible {
    border-color: #333;
  }
  .shell-curriculum-success {
    background: rgba(61, 220, 132, 0.12);
    border: 1px solid rgba(61, 140, 89, 0.35);
    color: #175a31;
    border-radius: 4px;
    padding: 0.55rem 0.85rem;
    margin: 0.75rem 0;
  }
  .shell-assign-overlay {
    position: fixed;
    inset: 0;
    background: rgba(20, 20, 20, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    z-index: 1000;
    overflow-y: auto;
  }
  .shell-assign-dialog {
    background: #fff;
    border-radius: 6px;
    padding: 1rem 1.25rem;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
    width: 100%;
    max-width: 34rem;
    max-height: calc(100vh - 2rem);
    overflow-y: auto;
    box-sizing: border-box;
  }
  .shell-assign-title {
    font-size: 1.05rem;
    margin: 0 0 0.75rem 0;
    color: #222;
  }
  .shell-assign-body {
    margin: 0 0 0.75rem 0;
  }
  .shell-assign-loading, .shell-assign-empty {
    color: #555;
    margin: 0.25rem 0 0.5rem 0;
  }
  .shell-assign-rows {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .shell-assign-row {
    background: #fafafa;
    border: 1px solid rgba(0, 0, 0, 0.09);
    border-radius: 6px;
    padding: 0.65rem 0.8rem;
  }
  .shell-assign-row-disabled {
    opacity: 0.65;
  }
  .shell-assign-row-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-weight: 600;
    color: #222;
    margin-bottom: 0.4rem;
    cursor: pointer;
  }
  .shell-assign-row-label {
    display: inline-block;
  }
  .shell-assign-row-fields {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(9rem, 1fr));
    gap: 0.5rem 0.75rem;
  }
  .shell-assign-field {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
    font-size: 0.9rem;
    color: #333;
  }
  .shell-assign-field-label {

  @media (pointer: coarse) {

    .shell-assign-field input,

    .shell-assign-row-fields { grid-template-columns: 1fr; }

  /* Sprint 20 internal beta: Classes create-class + join-code panels.
     Reuses the shell card language; introduces no new design system. */
  .shell-form {

  /* ------------------------------------------------------------------
     Sprint 20: Teacher Visual Identity Refinement.
     Layered on top of the canonical shell rules above. Introduces no
     new components, class names, copy, or interaction. Only design
     tokens (palette, elevation, rhythm) applied to existing selectors,
     so every certified workflow is preserved. Values are derived from
     the established LyfeLabz palette: the student experience keeps its
     brighter tones; the teacher surface reads as a calmer sibling.
     ------------------------------------------------------------------ */
  :root {
    /* Teacher-adjacent palette. Anchored to the same greens the
       student surface uses so buttons and success states remain
       instantly recognizable across both experiences. */
    --tw-ink:            #1c2733;
    --tw-ink-soft:       #3a4653;
    --tw-ink-muted:      #566472;
    --tw-hairline:       rgba(28, 39, 51, 0.09);
    --tw-hairline-soft:  rgba(28, 39, 51, 0.06);
    --tw-page:           #f5f4f0;   /* warm gray */
    --tw-surface:        #ffffff;
    --tw-surface-alt:    #faf9f6;
    --tw-nav-wash:       rgba(26, 95, 111, 0.08);
    --tw-nav-edge:       #1a5f6f;   /* deep muted teal */
    --tw-primary:        #1f6b3d;   /* preserved LyfeLabz green */
    --tw-primary-strong: #175a31;
    --tw-primary-wash:   rgba(31, 107, 61, 0.09);
    --tw-focus-ring:     0 0 0 3px rgba(26, 95, 111, 0.22);
    --tw-shadow-card:    0 1px 2px rgba(28, 39, 51, 0.04),
                         0 1px 3px rgba(28, 39, 51, 0.05);
    --tw-shadow-header:  0 1px 0 rgba(28, 39, 51, 0.06);
    --tw-shadow-elev:    0 10px 32px rgba(20, 32, 44, 0.20);
    --tw-radius-card:    10px;
    --tw-radius-control: 6px;
    --tw-radius-pill:    999px;
  }

  /* Page canvas: warm gray page, white content cards, calmer ink. */
  body {
    background: var(--tw-page);
    color: var(--tw-ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Header: subtle base shadow instead of a hard 1px border; refined
     brand hierarchy. Layout, height, and controls unchanged. */
  #app-root:has(> .shell-header) .shell-header {
    border-bottom: 1px solid var(--tw-hairline-soft);
    box-shadow: var(--tw-shadow-header);
    background: var(--tw-surface);
  }
  .shell-brand {
    color: var(--tw-ink);
    letter-spacing: -0.005em;
  }
  .shell-header-identity { color: var(--tw-ink-muted); }
  .shell-signout {
    border-color: var(--tw-hairline);
    border-radius: var(--tw-radius-control);
    color: var(--tw-ink-soft);
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .shell-signout:hover,
  .shell-signout:focus-visible {
    border-color: var(--tw-nav-edge);
    background: var(--tw-nav-wash);
  }

  /* Navigation: preserve layout; refine active state to a calm teal
     wash with a leading edge, so the current surface reads at a
     glance without shouting. Nav brand keeps its role as the section
     anchor. */
  .shell-body { gap: 1.75rem; }
  .shell-nav-list { gap: 0.15rem; }
  .shell-nav-button {
    color: var(--tw-ink-soft);
    border-radius: var(--tw-radius-control);
    transition: background 0.15s ease, color 0.15s ease;
    position: relative;
  }
  .shell-nav-button:hover:not(.shell-nav-active):not(.shell-nav-disabled),
  .shell-nav-button:focus-visible:not(.shell-nav-active):not(.shell-nav-disabled) {
    background: rgba(28, 39, 51, 0.04);
    color: var(--tw-ink);
  }
  .shell-nav-active {
    background: var(--tw-nav-wash);
    color: var(--tw-nav-edge);
  }
  .shell-nav-active::before {
    content: "";
    position: absolute;
    left: 0;
    top: 20%;
    bottom: 20%;
    width: 3px;
    border-radius: 0 3px 3px 0;
    background: var(--tw-nav-edge);
  }
  .shell-nav-brand {
    color: var(--tw-ink);
    letter-spacing: 0.08em;
    border-bottom-color: var(--tw-hairline-soft);
  }
  .shell-nav-brand.shell-nav-active { color: var(--tw-ink); }
  .shell-nav-brand.shell-nav-active::before { content: none; }

  /* Cards: softer hairline, gentle elevation, more breathing room.
     Structure, padding-baseline, and content unchanged. */
  .shell-card {
    border-color: var(--tw-hairline);
    border-radius: var(--tw-radius-card);
    box-shadow: var(--tw-shadow-card);
    padding: 1.15rem 1.25rem;
  }

  /* Dashboard hierarchy: the welcome headline anchors the space with
     a slightly larger, calmer weight. Reads immediately as "you are
     here" without changing structure. */
  .shell-welcome {
    font-size: 1.7rem;
    font-weight: 600;
    color: var(--tw-ink);
    letter-spacing: -0.012em;
    line-height: 1.25;
    margin: 0 0 0.4rem 0;
  }
  .shell-welcome:focus-visible {
    outline-color: var(--tw-nav-edge);
  }
  .shell-status { color: var(--tw-ink-muted); }

  /* Filter chips: softer body, teal-tinted active state to echo the
     nav language. */
  .shell-filter-pill {
    border-color: var(--tw-hairline);
    color: var(--tw-ink-soft);
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .shell-filter-pill:hover,
  .shell-filter-pill:focus-visible { border-color: var(--tw-nav-edge); }
  .shell-filter-pill-active {
    background: var(--tw-nav-wash);
    border-color: var(--tw-nav-edge);
    color: var(--tw-nav-edge);
  }

  /* Lesson cards on Curriculum: same hairline + elevation contract as
     the primary shell card. Preserves color-coded topic badges. */
  .shell-lesson-card {
    background: var(--tw-surface);
    border-color: var(--tw-hairline);
    border-radius: var(--tw-radius-card);
    box-shadow: var(--tw-shadow-card);
  }
  .shell-lesson-card-inactive {
    background: var(--tw-surface-alt);
    box-shadow: none;
  }
  .shell-lesson-title { color: var(--tw-ink); }

  /* Primary action: keep the LyfeLabz green identity (buttons must
     stay instantly recognizable across student + teacher), but with
     a slightly larger radius, matched focus ring, and micro shadow
     that makes it feel intentional rather than raw. */
  .shell-lesson-assign,
  .shell-assign-confirm,
  .shell-classes-create-open,
  .shell-classes-create-actions button[type="submit"] {
    border-radius: var(--tw-radius-control);
    box-shadow: 0 1px 2px rgba(23, 90, 49, 0.18);
    transition: background 0.15s ease, border-color 0.15s ease,
                box-shadow 0.15s ease;
  }
  .shell-lesson-view-summary,
  .shell-assign-cancel,
  .shell-summary-select-choice,
  .shell-classes-create-cancel {
    border-radius: var(--tw-radius-control);
    border-color: var(--tw-hairline);
    color: var(--tw-ink-soft);
  }
  .shell-lesson-view-summary:hover,
  .shell-lesson-view-summary:focus-visible,
  .shell-assign-cancel:hover,
  .shell-assign-cancel:focus-visible,
  .shell-summary-select-choice:hover,
  .shell-summary-select-choice:focus-visible {
    border-color: var(--tw-nav-edge);
  }

  /* Consistent focus treatment across every interactive control in
     the teacher surface. Preserves keyboard-navigation clarity. */
  .shell-nav-button:focus-visible,
  .shell-signout:focus-visible,
  .shell-filter-pill:focus-visible,
  .shell-lesson-assign:focus-visible,
  .shell-lesson-view-summary:focus-visible,
  .shell-lesson-toggle:focus-visible,
  .shell-assign-confirm:focus-visible,
  .shell-assign-cancel:focus-visible,
  .shell-summary-select-choice:focus-visible,
  .shell-classes-create-open:focus-visible,
  .shell-classes-create-actions button:focus-visible,
  .shell-classes-joincode-dismiss:focus-visible,
  .shell-integrations-back:focus-visible {
    outline: none;
    box-shadow: var(--tw-focus-ring);
  }

  /* Modal + inline callouts: refined elevation, softer hairlines. */
  .shell-assign-dialog {
    border-radius: var(--tw-radius-card);
    box-shadow: var(--tw-shadow-elev);
  }
  .shell-assign-row,
  .shell-integrations-candidate,
  .shell-classes-create-form {
    border-color: var(--tw-hairline);
    background: var(--tw-surface-alt);
    border-radius: var(--tw-radius-card);
  }

  /* Placeholder tiles (Dashboard preview grid). Slightly warmer than
     the page canvas, quieter ink, so they read as "coming soon"
     without feeling broken. */
  .shell-placeholder-card {
    background: var(--tw-surface-alt);
    border-color: var(--tw-hairline);
    border-radius: var(--tw-radius-card);
    color: var(--tw-ink-muted);
  }
  .shell-placeholder-card:hover,
  .shell-placeholder-card:focus { background: var(--tw-surface-alt); }
  .shell-placeholder-title { color: var(--tw-ink-soft); }

  /* Footer: aligned with the calmer ink scale. */
  .shell-footer {
    color: var(--tw-ink-muted);
    border-top-color: var(--tw-hairline-soft);
  }

  /* Respect user motion preferences: the additions above are subtle
     but honor reduced-motion just like the base sheet does. */
  @media (prefers-reduced-motion: reduce) {
    .shell-nav-button,
    .shell-signout,
    .shell-filter-pill,
    .shell-lesson-assign,
    .shell-lesson-view-summary,
    .shell-assign-confirm,
    .shell-assign-cancel,
    .shell-summary-select-choice {
      transition: none !important;
    }
  }

  /* ------------------------------------------------------------------
     Sprint 20: Teacher Visual Identity Refinement, Pass 2.
     Focused amendment layered on top of Pass 1. Resolves the remaining
     conflict between the teacher token layer and legacy hardcoded
     shell colors/radii that still visually contradict it. No new
     components, class names, copy, DOM, or interaction. Only calmer
     palette derivatives and radius/heading unification applied to
     existing selectors. Semantic tokens listed here so the amendment
     block reads as one system. Contrast preserved WCAG AA on white
     canvas. Intentional legacy retained: the LyfeLabz green primary
     button identity, because it must remain instantly recognizable
     across student + teacher surfaces per the identity spec. */
  :root {
    --tw-topic-life-bg:      rgba(53, 118, 84, 0.10);
    --tw-topic-life-ink:     #1f6b3d;
    --tw-topic-earth-bg:     rgba(107, 88, 148, 0.10);
    --tw-topic-earth-ink:    #4d3d78;
    --tw-topic-physical-bg: rgba(160, 84, 60, 0.10);
    --tw-topic-physical-ink: #7a3e22;
    --tw-topic-tech-bg:     rgba(140, 106, 40, 0.10);
    --tw-topic-tech-ink:    #6a5010;

    --tw-badge-neutral-bg:  rgba(28, 39, 51, 0.055);
    --tw-badge-neutral-ink: var(--tw-ink-soft);

    --tw-toggle-inactive-bg:  var(--tw-surface);
    --tw-toggle-inactive-ink: var(--tw-ink-muted);
    --tw-toggle-active-bg:    var(--tw-nav-wash);
    --tw-toggle-active-edge:  var(--tw-nav-edge);
    --tw-toggle-active-ink:   var(--tw-nav-edge);

    --tw-pill-verified-bg:   rgba(26, 95, 111, 0.12);
    --tw-pill-verified-ink:  #124651;
    --tw-pill-verified-edge: rgba(26, 95, 111, 0.30);

    --tw-callout-info-bg:      rgba(26, 95, 111, 0.08);
    --tw-callout-info-edge:    rgba(26, 95, 111, 0.28);
    --tw-callout-info-ink:     #124651;
    --tw-callout-success-bg:   rgba(31, 107, 61, 0.08);
    --tw-callout-success-edge: rgba(31, 107, 61, 0.30);
    --tw-callout-success-ink:  var(--tw-primary-strong);
    --tw-callout-error-bg:     rgba(160, 84, 60, 0.08);
    --tw-callout-error-edge:   rgba(160, 84, 60, 0.32);
    --tw-callout-error-ink:    #7a3e22;
  }

  /* 1. Topic + grade badges: calmer, teacher-side variants. Preserved
        differentiation, softened saturation, ink from the teacher
        scale. */
  .shell-lesson-badge {
    background: var(--tw-badge-neutral-bg);
    color: var(--tw-badge-neutral-ink);
    border-color: var(--tw-hairline);
    border-radius: var(--tw-radius-pill);
  }
  .shell-lesson-topic-life-science {
    background: var(--tw-topic-life-bg);
    color: var(--tw-topic-life-ink);
  }
  .shell-lesson-topic-earth-space {
    background: var(--tw-topic-earth-bg);
    color: var(--tw-topic-earth-ink);
  }
  .shell-lesson-topic-physical-science {
    background: var(--tw-topic-physical-bg);
    color: var(--tw-topic-physical-ink);
  }
  .shell-lesson-topic-tech-engineering {
    background: var(--tw-topic-tech-bg);
    color: var(--tw-topic-tech-ink);
  }
  .shell-integrations-pill-inactive {
    background: var(--tw-badge-neutral-bg);
    color: var(--tw-ink-muted);
    border-color: var(--tw-hairline);
  }

  /* 2. Inactive toggle: neutral teacher-side treatment. Active toggle
        adopts the muted-teal teacher accent (matching nav + filter
        chips) so the on/off relationship reads clearly without the
        legacy orange competing for attention. Behavior unchanged. */
  .shell-lesson-toggle {
    background: var(--tw-toggle-inactive-bg);
    border-color: var(--tw-hairline);
    color: var(--tw-toggle-inactive-ink);
    border-radius: var(--tw-radius-pill);
  }
  .shell-lesson-toggle-inactive {
    background: var(--tw-toggle-inactive-bg);
    border-color: var(--tw-hairline);
    color: var(--tw-toggle-inactive-ink);
  }
  .shell-lesson-toggle-active {
    background: var(--tw-toggle-active-bg);
    border-color: var(--tw-toggle-active-edge);
    color: var(--tw-toggle-active-ink);
  }
  .shell-lesson-toggle:hover,
  .shell-lesson-toggle:focus-visible {
    border-color: var(--tw-nav-edge);
  }

  /* 3. Verified pill: teacher identity replacement for the gold
        treatment. Copy + meaning preserved; palette drops into the
        teal identity. */
  .shell-pill-verified {
    background: var(--tw-pill-verified-bg);
    color: var(--tw-pill-verified-ink);
    border: 1px solid var(--tw-pill-verified-edge);
  }

  /* 4. Section-heading tier: one consistent step between the page
        welcome (1.7rem) and body copy. Applied to card titles and
        section-level headings that previously sat at ~1.00-1.05rem. */
  .shell-placeholder-title,
  .shell-integrations-heading,
  .shell-assign-title,
  .shell-classes-create-heading,
  .shell-classes-joincode-heading,
  .shell-lesson-title {
    font-size: 1.18rem;
    font-weight: 600;
    color: var(--tw-ink);
    letter-spacing: -0.006em;
    line-height: 1.3;
  }
  .shell-lesson-card-inactive .shell-lesson-title { color: var(--tw-ink-muted); }
  .shell-classes-joincode-heading { color: var(--tw-primary-strong); }

  /* 5. Semantic callouts: teacher-side palette derivatives. */
  .shell-integrations-error,
  .shell-classes-create-error {
    background: var(--tw-callout-error-bg);
    border-color: var(--tw-callout-error-edge);
    color: var(--tw-callout-error-ink);
    border-radius: var(--tw-radius-control);
  }
  .shell-integrations-info {
    background: var(--tw-callout-info-bg);
    border-color: var(--tw-callout-info-edge);
    color: var(--tw-callout-info-ink);
    border-radius: var(--tw-radius-control);
  }
  .shell-curriculum-success {
    background: var(--tw-callout-success-bg);
    border-color: var(--tw-callout-success-edge);
    color: var(--tw-callout-success-ink);
    border-radius: var(--tw-radius-control);
  }
  .shell-classes-joincode {
    background: var(--tw-callout-success-bg);
    border-color: var(--tw-callout-success-edge);
    border-radius: var(--tw-radius-card);
  }

  /* 6. Radius + token unification. Pass 1 addressed the primary
        controls. This pass resolves remaining 4px legacy overrides
        on form inputs, callouts, and small controls so every teacher
        surface honors the same radius scale. */
  .shell-form input,
  .shell-form select,
  .shell-assign-field input,
  .shell-assign-field select,

  /* Assignment Status Bar (Sprint 20 refinement):
     - The Assign / Assigned control keeps an identical footprint across
       states so it feels like the same control changing rather than
       being replaced. Only fill, border, and ink change on assignment.
     - View summaries reads as a quiet, right-side management action so
       it never competes with the primary Assign / Assigned control. */
  /* Assigned state reads as a compact status affordance, not a boxed
     button. Border, fill, and shadow are stripped so it sits quietly
     next to the primary View summaries control on the right. */
  .shell-lesson-assign-assigned {
    background: transparent;
    color: var(--tw-primary-strong);
    border: 1px solid transparent;
    box-shadow: none;
    padding: 0.15rem 0.25rem 0.15rem 0;

  /* Active Assignments accordion toggle: compact, quiet, no caret. The

  .shell-active-assignments-toggle-btn {
