<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LyfeLabz Platform</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.5;
  }
  #app-root { text-align: center; padding: 1.5rem; max-width: 40rem; }
  h1 { font-size: 1.5rem; font-weight: 500; margin: 0 0 0.5rem 0; }
  p { margin: 0.25rem 0; }
  button { margin-top: 1rem; padding: 0.5rem 1rem; font: inherit; cursor: pointer; }
  [role="alert"] { color: #a00; }
</style>
<style id="shell-canonical">
  /* Teacher Platform Shell layout tokens. Reuses inherited typography;
     introduces no new design system. See SPRINT_3_STEP_5_SPECIFICATION.md. */
  #app-root:has(> .shell-header) {
    display: block;
    text-align: left;
    padding: 0;
    max-width: none;
    width: 100%;
    align-self: stretch;
  }
  body:has(#app-root > .shell-header) {
    display: block;
    align-items: initial;
    justify-content: initial;
  }
  .shell-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.5rem 1.25rem;
    height: 56px;
    border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    background: #fff;
    box-sizing: border-box;
  }
  .shell-brand {
    font-size: 1.05rem;
    font-weight: 600;
    margin: 0;
    flex: 0 0 auto;
  }
  .shell-header-identity {
    flex: 1 1 auto;
    text-align: right;
    font-size: 0.95rem;
    color: #444;
    min-width: 0;
  }
  .shell-header-name {
    display: inline-block;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    vertical-align: bottom;
  }
  .shell-notifications {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    color: #b8b8b8;
    font-size: 1.15rem;
    line-height: 1;
    flex: 0 0 auto;
    user-select: none;
  }
  .shell-signout {
    margin: 0;
    padding: 0.4rem 0.9rem;
    background: transparent;
    border: 1px solid #ccc;
    border-radius: 4px;
    cursor: pointer;
    font: inherit;
    flex: 0 0 auto;
    min-height: 36px;
  }
  .shell-signout:hover, .shell-signout:focus-visible {
    border-color: #666;
  }
  .shell-body {
    display: grid;
    grid-template-columns: 224px 1fr;
    max-width: 1120px;
    margin: 0 auto;
    padding: 1.25rem;
    gap: 1.5rem;
    box-sizing: border-box;
  }
  .shell-nav-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }
  .shell-nav-button {
    display: block;
    width: 100%;
    text-align: left;
    padding: 0.55rem 0.75rem;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 4px;
    font: inherit;
    margin: 0;
    min-height: 40px;
    box-sizing: border-box;
  }
  .shell-nav-active {
    background: #f4f4f4;
    font-weight: 600;
    cursor: default;
  }
  .shell-nav-brand {
    font-weight: 700;
    letter-spacing: 0.06em;
    color: #222;
    padding-top: 0.65rem;
    padding-bottom: 0.65rem;
    margin-bottom: 0.35rem;
    border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    border-radius: 0;
    background: transparent;
  }
  .shell-nav-brand.shell-nav-active {
    background: transparent;
  }
  .shell-nav-disabled {
    color: #8a8a8a;
    cursor: not-allowed;
  }
  .shell-nav-disabled:hover, .shell-nav-disabled:focus { color: #8a8a8a; }
  .shell-main {
    display: block;
    min-width: 0;
  }
  .shell-welcome {
    font-size: 1.5rem;
    font-weight: 500;
    margin: 0 0 0.5rem 0;
    outline: none;
  }
  .shell-welcome:focus-visible { outline: 2px solid #444; outline-offset: 2px; }
  .shell-status {
    color: #555;
    margin: 0 0 1.25rem 0;
  }
  .shell-card {
    background: #fff;
    border: 1px solid rgba(0, 0, 0, 0.09);
    border-radius: 6px;
    padding: 1rem 1.15rem;
    margin: 0 0 1rem 0;
  }
  .shell-identity-list {
    display: grid;
    grid-template-columns: minmax(120px, auto) 1fr;
    gap: 0.35rem 1rem;
    margin: 0;
  }
  .shell-identity-row {
    display: contents;
  }
  .shell-identity-row dt {
    font-weight: 600;
    color: #333;
    margin: 0;
  }
  .shell-identity-row dd {
    margin: 0;
    color: #222;
    word-break: break-word;
  }
  .shell-pill {
    display: inline-block;
    padding: 0.1rem 0.55rem;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 600;
    line-height: 1.3;
  }
  .shell-pill-verified {
    background: rgba(207, 168, 60, 0.18);
    color: #8a6d15;
    border: 1px solid rgba(138, 109, 21, 0.25);
  }
  .shell-placeholder-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin: 0.5rem 0 1.5rem 0;
  }
  .shell-placeholder-card {
    background: #fafafa;
    color: #666;
    cursor: not-allowed;
  }
  .shell-placeholder-card:hover, .shell-placeholder-card:focus { background: #fafafa; }
  .shell-placeholder-title {
    font-size: 1rem;
    margin: 0 0 0.35rem 0;
    color: #333;
  }
  .shell-placeholder-purpose { margin: 0 0 0.5rem 0; }
  .shell-placeholder-status { margin: 0; font-size: 0.9rem; }
  .shell-return-link {
    display: inline-block;
    margin-top: 0.75rem;
    font-size: 0.9rem;
    color: #555;
  }
  /* Curriculum landing (Sprint 6D). Reuses the shell card language and
     introduces teacher-only activation controls. Placeholder-only:
     activation state is client-local per mount. */
  .shell-curriculum-intro {
    max-width: 46rem;
  }
  .shell-curriculum-controls {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin: 0 0 1rem 0;
  }
  .shell-filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
  }
  .shell-filter-pill {
    padding: 0.35rem 0.75rem;
    background: #fff;
    border: 1px solid rgba(0, 0, 0, 0.15);
    border-radius: 999px;
    font: inherit;
    font-size: 0.9rem;
    color: #333;
    cursor: pointer;
    min-height: 32px;
  }
  .shell-filter-pill:hover, .shell-filter-pill:focus-visible {
    border-color: #666;
  }
  .shell-filter-pill-active {
    background: #eef1f5;
    border-color: #666;
    font-weight: 600;
  }
  .shell-curriculum-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 0.85rem;
    margin: 0.75rem 0 1.25rem 0;
  }
  .shell-lesson-card {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    padding: 0.9rem 1rem;
    transition: opacity 0.15s ease-in-out;
  }
  .shell-lesson-card[hidden] { display: none; }
  .shell-lesson-card-inactive {
    background: #f6f6f6;
    opacity: 0.72;
  }
  .shell-lesson-header {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    align-items: center;
  }
  .shell-lesson-badge {
    display: inline-block;
    padding: 0.1rem 0.55rem;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
    line-height: 1.4;
    background: #eef1f5;
    color: #444;
    border: 1px solid rgba(0, 0, 0, 0.08);
  }
  .shell-lesson-topic-life-science       { background: rgba(61,220,132,0.14);  color: #1f6b3d; }
  .shell-lesson-topic-earth-space        { background: rgba(180,127,255,0.14); color: #5b3a99; }
  .shell-lesson-topic-physical-science   { background: rgba(255,112,67,0.14);  color: #a24218; }
  .shell-lesson-topic-tech-engineering   { background: rgba(245,200,66,0.18);  color: #7a5b0a; }
  .shell-lesson-title {
    font-size: 1.02rem;
    font-weight: 600;
    color: #222;
    margin: 0;
  }
  .shell-lesson-card-inactive .shell-lesson-title { color: #555; }
  .shell-lesson-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.5rem;
    margin-top: auto;
  }
  .shell-lesson-preview {
    font-size: 0.9rem;
    color: #444;
    text-decoration: underline;
  }
  .shell-lesson-toggle {
    padding: 0.3rem 0.7rem;
    background: #fff;
    border: 1px solid rgba(0, 0, 0, 0.18);
    border-radius: 4px;
    font: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    min-height: 32px;
  }
  .shell-lesson-toggle-active {
    background: rgba(61, 140, 89, 0.12);
    border-color: rgba(61, 140, 89, 0.45);
    color: #1f6b3d;
    font-weight: 600;
  }
  .shell-lesson-toggle-inactive {
    background: #fff;
    border-color: rgba(0, 0, 0, 0.18);
    color: #666;
  }
  .shell-lesson-toggle:hover, .shell-lesson-toggle:focus-visible {
    border-color: #333;
  }
  .shell-curriculum-empty {
    color: #666;
    margin: 0.25rem 0 1rem 0;
  }
  @media (pointer: coarse) {
    .shell-filter-pill, .shell-lesson-toggle { min-height: 44px; }
  }
  .shell-footer {
    text-align: center;
    padding: 1rem;
    color: #888;
    font-size: 0.85rem;
    border-top: 1px solid rgba(0, 0, 0, 0.06);
    margin-top: 1.5rem;
  }
  @media (max-width: 960px) {
    .shell-placeholder-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 720px) {
    .shell-body { grid-template-columns: 1fr; padding: 1rem; gap: 1rem; }
    .shell-nav-list { flex-direction: row; overflow-x: auto; }
    .shell-nav-button { min-width: 140px; }
    .shell-placeholder-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 480px) {
    .shell-header { height: 48px; padding: 0.35rem 0.75rem; gap: 0.5rem; }
    .shell-brand { font-size: 0.95rem; }
    .shell-header-identity { display: none; }
  }
  @media (pointer: coarse) {
    .shell-nav-button, .shell-signout { min-height: 44px; }
    .shell-notifications { width: 44px; height: 44px; }
  }
  @media (orientation: landscape) and (max-width: 950px) {
    .shell-body { padding-left: max(1rem, env(safe-area-inset-left)); padding-right: max(1rem, env(safe-area-inset-right)); }
  }
  @media (prefers-reduced-motion: reduce) {
    .shell-main, .shell-card { transition: none !important; animation: none !important; }
  }
  /* Sprint 8C: Settings > Integrations surface. Reuses the shell card
     language; introduces no new design system. */
  .shell-settings-category-button {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    padding: 0;
    font: inherit;
    color: inherit;
    cursor: pointer;
  }
  .shell-settings-category-button:hover .shell-settings-category-title,
  .shell-settings-category-button:focus-visible .shell-settings-category-title {
    text-decoration: underline;
  }
  .shell-settings-category-hint {
    margin: 0.35rem 0 0 0;
    font-size: 0.85rem;
    color: #555;
  }
  .shell-integrations {
    display: block;
  }
  .shell-integrations-back {
    background: transparent;
    border: none;
    color: #444;
    font: inherit;
    padding: 0.25rem 0;
    margin-bottom: 0.5rem;
    cursor: pointer;
  }
  .shell-integrations-back:hover,
  .shell-integrations-back:focus-visible { text-decoration: underline; }
  .shell-integrations-heading {
    font-size: 1.05rem;
    margin: 0;
    color: #222;
  }
  .shell-integrations-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  .shell-integrations-row {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .shell-integrations-row-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    justify-content: space-between;
    flex-wrap: wrap;
  }
  .shell-integrations-pill-inactive {
    background: #eef1f5;
    color: #555;
    border: 1px solid rgba(0, 0, 0, 0.08);
  }
  .shell-integrations-actions {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .shell-integrations-error {
    color: #a24218;
    background: rgba(255, 112, 67, 0.08);
    border: 1px solid rgba(162, 66, 24, 0.25);
    border-radius: 4px;
    padding: 0.6rem 0.85rem;
    margin: 0 0 1rem 0;
  }
  .shell-integrations-info {
    color: #1f6b3d;
    background: rgba(61, 220, 132, 0.08);
    border: 1px solid rgba(61, 140, 89, 0.3);
    border-radius: 4px;
    padding: 0.6rem 0.85rem;
    margin: 0 0 1rem 0;
  }
  .shell-integrations-candidates {
    list-style: none;
    padding: 0;
    margin: 0.5rem 0 1rem 0;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }
  .shell-integrations-candidate {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 0.9rem;
    background: #fafafa;
    border: 1px solid rgba(0, 0, 0, 0.09);
    border-radius: 4px;
    flex-wrap: wrap;
  }
  .shell-integrations-candidate-name { margin: 0; font-weight: 600; color: #222; }
  .shell-integrations-candidate-section { margin: 0.15rem 0 0 0; font-size: 0.85rem; color: #555; }
  .shell-integrations-candidate-controls {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .shell-integrations-select-label {
    font-size: 0.85rem;
    color: #444;
  }
  .shell-integrations-select {
    font: inherit;
    padding: 0.3rem 0.4rem;
    min-height: 32px;
    border: 1px solid rgba(0, 0, 0, 0.18);
    border-radius: 4px;
    background: #fff;
  }
  .shell-integrations-empty {
    color: #555;
    margin: 0.5rem 0 1rem 0;
  }
  @media (pointer: coarse) {
    .shell-integrations-back, .shell-integrations-select { min-height: 44px; }
  }
</style>
</head>
<body>
<main id="app-root" role="main"><p role="status">Loading LyfeLabz Platform</p></main>
<script type="module" src="./dist/bundle.js"></script>
</body>
</html>
