name: Platform CI

on:
  pull_request:
    paths:
      - 'platform/**'
      - '.github/workflows/platform-ci.yml'
  push:
    branches: [main]
    paths:
      - 'platform/**'
      - '.github/workflows/platform-ci.yml'

jobs:
  functions:
    name: Functions (lint, typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: platform/functions/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  firestore-rules:
    name: Firestore Rules tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/firebase
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: platform/firebase/package-lock.json
      - name: Set up Java (Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install dependencies
        run: npm ci
      - name: Run Firestore Rules tests
        run: npm run test:rules
